<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Priorly</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fafafa; color: #111;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f0f0f0; }
    }
    main { text-align: center; max-width: 480px; padding: 32px 24px; }
    h1 { font-size: 48px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    p  { color: #666; line-height: 1.5; }
    @media (prefers-color-scheme: dark) { p { color: #a0a0a0; } }
  </style>
</head>
<body>
  <main>
    <h1>Priorly</h1>
    <p>Make predictions with friends. Track who was right.</p>
    <p style="margin-top: 32px; font-size: 14px;">iOS app — coming soon.</p>
  </main>
</body>
</html>
