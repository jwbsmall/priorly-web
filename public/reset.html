<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Priorly password</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fafafa; color: #111;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f0f0f0; }
    }
    main { text-align: center; max-width: 480px; padding: 32px 24px; }
    h1 { font-size: 32px; font-weight: 700; margin: 0 0 16px; letter-spacing: -0.02em; }
    p  { color: #666; line-height: 1.5; }
    @media (prefers-color-scheme: dark) { p { color: #a0a0a0; } }
    .cta {
      display: inline-block; margin-top: 24px;
      padding: 14px 28px; border-radius: 12px;
      background: #007aff; color: white; text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Reset your password</h1>
    <p>Open this link on the iPhone where Priorly is installed to set a new password.</p>
    <a class="cta" href="#" id="open">Open in Priorly</a>
  </main>
  <script>
    document.getElementById('open').href = window.location.href;
  </script>
</body>
</html>
