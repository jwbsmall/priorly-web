name: Secrets scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Reviewed for command-injection: no github.event.* / github.head_ref fields
# are interpolated. Only secrets.GITHUB_TOKEN (server-managed) and the action's
# own static config are referenced.

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
